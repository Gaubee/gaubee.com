#:schema node_modules/wrangler/config-schema.json
name = "gaubee-auth"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 环境变量（非敏感，可提交）：
# - APP_ORIGIN：静态站点的 origin，CORS 与重定向白名单用。部署时设置。
# - ENVIRONMENT：dev 时允许 localhost CORS；生产设为 "production" 严格白名单。
# 敏感变量（GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET）用 wrangler secret put 设置，不入库。
[vars]
APP_ORIGIN = "http://localhost:5173"
ENVIRONMENT = "dev"

# 生产环境配置（CI 用 wrangler deploy --env production 触发）：
# APP_ORIGIN 必须与静态站（GitHub Pages）实际域名一致，用于 CORS 与 OAuth 回调重定向。
# 部署前请确认下面两个值与你的实际域名匹配。
[env.production.vars]
APP_ORIGIN = "https://gaubee.com"
ENVIRONMENT = "production"

# OAuth 回调路径必须与 GitHub OAuth App 配置的 Authorization callback URL 一致：
# https://<worker-domain>/auth/github/callback
# 生产 Worker 域名请在 Cloudflare Dashboard 确认（默认 *.workers.dev，或绑定自定义域名），
# 然后到 GitHub OAuth App 把 Authorization callback URL 设为：
#   https://<worker-domain>/auth/github/callback
# 同时确保前端（APP_ORIGIN）调用 Worker 的地址正确（见 src/lib 中 Worker URL 配置）。

# 本地开发：wrangler dev 默认 http://localhost:8787
# 生产：部署到 *.workers.dev 或自定义域名

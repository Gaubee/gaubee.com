#:schema node_modules/wrangler/config-schema.json
name = "gaubee-auth"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 环境变量（非敏感，可提交）：
# - APP_ORIGIN：静态站点的 origin，CORS 与重定向白名单用。部署时设置。
# 敏感变量（GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET）用 wrangler secret put 设置，不入库。
[vars]
APP_ORIGIN = "http://localhost:5173"

# OAuth 回调路径必须与 GitHub OAuth App 配置的 Authorization callback URL 一致：
# https://<worker-domain>/auth/github/callback

# 本地开发：wrangler dev 默认 http://localhost:8787
# 生产：部署到 *.workers.dev 或自定义域名

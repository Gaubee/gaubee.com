name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # 允许在 Actions 面板手动触发
  workflow_dispatch:

# 允许克隆仓库并创建 GitHub Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一条部署，排队中的取消旧的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        # pnpm build = content:prepare（生成只读 VFS + 搜索索引）+ vite build（adapter-static 输出 build/）
        # VITE_AUTH_BASE：生产环境的 Cloudflare Worker 域名（OAuth + API 代理）。
        # 在 GitHub Secrets 配置 VITE_AUTH_BASE（如 https://gaubee-auth.workers.dev）。
        # 未配置时回退到 localhost（仅开发用），生产构建会警告。
        env:
          VITE_AUTH_BASE: ${{ secrets.VITE_AUTH_BASE }}
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # adapter-static 的输出目录
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
